<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lady Joana 👑</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            background: #111b21;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif;
        }

        .phone {
            width: 100%;
            max-width: 440px;
            height: 100vh;
            max-height: 860px;
            display: flex;
            flex-direction: column;
            background: #efeae2;
            overflow: hidden;
            border-radius: 12px;
            box-shadow: 0 8px 40px rgba(0,0,0,0.5);
        }

        /* ── Header ─────────────────────────────────────── */
        .header {
            background: #202c33;
            color: #e9edef;
            padding: 10px 16px;
            display: flex;
            align-items: center;
            gap: 10px;
            flex-shrink: 0;
        }

        .avatar {
            width: 42px;
            height: 42px;
            border-radius: 50%;
            object-fit: cover;
            flex-shrink: 0;
        }

        .avatar-fallback {
            width: 42px;
            height: 42px;
            border-radius: 50%;
            background: #6c757d;
            display: none;
            align-items: center;
            justify-content: center;
            font-size: 15px;
            font-weight: bold;
            color: white;
            flex-shrink: 0;
        }

        .header-info { flex: 1; min-width: 0; }
        .header-name { font-size: 16px; font-weight: 600; }
        .header-sub { font-size: 13px; color: #8696a0; }

        .debt-badge {
            background: #ea4335;
            color: white;
            font-size: 12px;
            padding: 4px 10px;
            border-radius: 20px;
            font-weight: 700;
            white-space: nowrap;
            flex-shrink: 0;
        }

        /* ── Chat ────────────────────────────────────────── */
        .chat {
            flex: 1;
            overflow-y: auto;
            padding: 10px 12px 4px;
            background: #efeae2;
            display: flex;
            flex-direction: column;
            gap: 2px;
        }

        .chat::-webkit-scrollbar { width: 5px; }
        .chat::-webkit-scrollbar-thumb { background: #c0b9af; border-radius: 3px; }

        /* ── Bubbles ─────────────────────────────────────── */
        .row {
            display: flex;
            align-items: flex-end;
            gap: 4px;
            margin-bottom: 1px;
        }

        .row.lady { justify-content: flex-start; }
        .row.samuel { justify-content: flex-end; }

        .mini-avatar {
            width: 26px;
            height: 26px;
            border-radius: 50%;
            object-fit: cover;
            flex-shrink: 0;
        }

        .bubble {
            max-width: 68%;
            padding: 6px 10px 4px;
            border-radius: 7.5px;
            font-size: 14.5px;
            line-height: 1.45;
            word-break: break-word;
        }

        .row.lady .bubble {
            background: #ffffff;
            border-top-left-radius: 0;
            box-shadow: 0 1px 0.5px rgba(11,20,26,.13);
        }

        .row.samuel .bubble {
            background: #d9fdd3;
            border-top-right-radius: 0;
            box-shadow: 0 1px 0.5px rgba(11,20,26,.13);
        }

        .meta {
            display: flex;
            justify-content: flex-end;
            align-items: center;
            gap: 3px;
            margin-top: 2px;
        }

        .time { font-size: 11px; color: #667781; }
        .ticks { font-size: 13px; color: #53bdeb; }

        /* ── Typing indicator ────────────────────────────── */
        .typing-row {
            display: flex;
            align-items: center;
            gap: 4px;
            padding: 2px 12px 6px;
            min-height: 36px;
        }

        .typing-bubble {
            background: white;
            border-radius: 7.5px;
            border-top-left-radius: 0;
            padding: 9px 14px;
            display: none;
            align-items: center;
            gap: 4px;
            box-shadow: 0 1px 0.5px rgba(11,20,26,.13);
        }

        .typing-bubble.show { display: flex; }

        .dot {
            width: 7px;
            height: 7px;
            background: #8696a0;
            border-radius: 50%;
            animation: blink 1.4s infinite;
        }
        .dot:nth-child(2) { animation-delay: .2s; }
        .dot:nth-child(3) { animation-delay: .4s; }

        @keyframes blink {
            0%, 80%, 100% { opacity: .4; transform: scale(.8); }
            40% { opacity: 1; transform: scale(1); }
        }

        /* ── Input ───────────────────────────────────────── */
        .input-area {
            background: #202c33;
            padding: 10px 14px;
            display: flex;
            gap: 8px;
            align-items: center;
            flex-shrink: 0;
        }

        .input-wrap {
            flex: 1;
            background: #2a3942;
            border-radius: 24px;
            padding: 9px 16px;
        }

        #msgInput {
            width: 100%;
            background: transparent;
            border: none;
            outline: none;
            color: #e9edef;
            font-size: 15px;
        }

        #msgInput::placeholder { color: #8696a0; }

        .send-btn {
            width: 46px;
            height: 46px;
            border-radius: 50%;
            border: none;
            background: #00a884;
            color: white;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
            transition: background .15s;
        }

        .send-btn:hover { background: #017961; }
        .send-btn:disabled { background: #3c4d55; cursor: not-allowed; }
    </style>
</head>
<body>
<div class="phone">

    <div class="header">
        <img src="lady.jpg" class="avatar" id="headerAvatar"
             onerror="this.style.display='none'; document.getElementById('headerFallback').style.display='flex'">
        <div class="avatar-fallback" id="headerFallback">LJ</div>
        <div class="header-info">
            <div class="header-name">Lady Joana 👑</div>
            <div class="header-sub" id="statusText">en línea</div>
        </div>
        <span class="debt-badge">💸 58€ sin pagar</span>
    </div>

    <div class="chat" id="chat"></div>

    <div class="typing-row">
        <img src="lady.jpg" class="mini-avatar" onerror="this.style.display='none'">
        <div class="typing-bubble" id="typingBubble">
            <div class="dot"></div><div class="dot"></div><div class="dot"></div>
        </div>
    </div>

    <div class="input-area">
        <div class="input-wrap">
            <input type="text" id="msgInput" placeholder="Escribe un mensaje..." autocomplete="off">
        </div>
        <button class="send-btn" id="sendBtn">
            <svg viewBox="0 0 24 24" width="22" height="22" fill="white">
                <path d="M1.101 21.757L23.8 12.028 1.101 2.3l.011 7.912 13.623 1.816-13.623 1.817-.011 7.912z"/>
            </svg>
        </button>
    </div>

</div>
<script src="prompt.js"></script>
<script>
// ── Configuración ──────────────────────────────────────────────────────
// ⚠️ Las API keys quedan expuestas en el cliente — sólo para uso local.
//    Para producción hace falta un backend proxy.
const API_KEYS = [
    "AIzaSyB1rOPEJXjwVMBqE_kvMJGwcaFX8MT6V_w",
    "AIzaSyATyuXk5pVRtPnaq51w89qPMc3bJY9x2ns"
];
// Índice de la key actual; se persiste para que tras una rotación se mantenga al recargar.
let keyIndex = Math.min(Number(localStorage.getItem('keyIndex')) || 0, API_KEYS.length - 1);

const MODEL   = "gemini-2.5-flash";
const MAX_CTX = 5; // últimos N intercambios (user + model)

// SYSTEM_PROMPT viene de prompt.js (cargado arriba). Una sola fuente de verdad.

// ── Estado ─────────────────────────────────────────────────────────────
let history = [];
let loading  = false;

// ── Referencias DOM ────────────────────────────────────────────────────
const chatEl       = document.getElementById('chat');
const msgInput     = document.getElementById('msgInput');
const sendBtn      = document.getElementById('sendBtn');
const typingBubble = document.getElementById('typingBubble');
const statusText   = document.getElementById('statusText');

// ── Helpers ─────────────────────────────────────────────────────────────
function now() {
    return new Date().toLocaleTimeString('es-ES', { hour: '2-digit', minute: '2-digit' });
}

function esc(text) {
    return text
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/\n/g, '<br>');
}

function addBubble(text, role) {
    const row = document.createElement('div');
    row.className = `row ${role}`;

    if (role === 'lady') {
        row.innerHTML = `
            <img src="lady.jpg" class="mini-avatar" onerror="this.style.display='none'">
            <div class="bubble">
                ${esc(text)}
                <div class="meta"><span class="time">${now()}</span></div>
            </div>`;
    } else {
        row.innerHTML = `
            <div class="bubble">
                ${esc(text)}
                <div class="meta">
                    <span class="time">${now()}</span>
                    <span class="ticks">✓✓</span>
                </div>
            </div>`;
    }

    chatEl.appendChild(row);
    chatEl.scrollTop = chatEl.scrollHeight;
}

function setLoading(on) {
    loading = on;
    sendBtn.disabled = on;
    typingBubble.classList.toggle('show', on);
    statusText.textContent = on ? 'escribiendo...' : 'en línea';
    if (on) chatEl.scrollTop = chatEl.scrollHeight;
}

// ── Llamada a Gemini con rotación automática de API key en caso de 429 ─
async function callGemini(ctx) {
    const body = JSON.stringify({
        systemInstruction: { parts: [{ text: SYSTEM_PROMPT }] },
        generationConfig:  { temperature: 0.9 },
        contents: ctx
    });
    let lastStatus = 0;
    for (let attempt = 0; attempt < API_KEYS.length; attempt++) {
        console.log(`[callGemini] Intento ${attempt + 1}/${API_KEYS.length} con key #${keyIndex}`);
        const res = await fetch(
            `https://generativelanguage.googleapis.com/v1beta/models/${MODEL}:generateContent?key=${API_KEYS[keyIndex]}`,
            { method: 'POST', headers: { 'Content-Type': 'application/json' }, body }
        );
        console.log(`[callGemini] Status recibido: ${res.status}`);
        if (res.ok) {
            const data = await res.json();
            return data.candidates[0].content.parts[0].text;
        }
        lastStatus = res.status;
        if (res.status === 429 && attempt < API_KEYS.length - 1) {
            console.warn(`[callGemini] Key #${keyIndex} agotada (429). Rotando a la siguiente.`);
            keyIndex = (keyIndex + 1) % API_KEYS.length;
            localStorage.setItem('keyIndex', keyIndex);
            continue;
        }
        console.error(`[callGemini] Fallo final con status ${res.status}, no rotando.`);
        break;
    }
    throw new Error(`HTTP ${lastStatus}`);
}

// ── Enviar mensaje ──────────────────────────────────────────────────────
async function send() {
    const text = msgInput.value.trim();
    if (!text || loading) return;

    msgInput.value = '';
    addBubble(text, 'samuel');
    history.push({ role: 'user', parts: [{ text }] });

    setLoading(true);
    try {
        const ctx   = history.slice(-(MAX_CTX * 2));
        const reply = await callGemini(ctx);
        history.push({ role: 'model', parts: [{ text: reply }] });
        addBubble(reply, 'lady');
    } catch (e) {
        addBubble('* Sin respuesta *', 'lady');
        console.error(e);
    } finally {
        setLoading(false);
    }
}

sendBtn.addEventListener('click', send);
msgInput.addEventListener('keydown', e => { if (e.key === 'Enter') send(); });

// ── Mensaje inicial de Lady ─────────────────────────────────────────────
(async () => {
    console.log('[init] chatbot cargado. API_KEYS length:', API_KEYS.length, 'keyIndex inicial:', keyIndex);
    await new Promise(r => setTimeout(r, 700));
    setLoading(true);
    await new Promise(r => setTimeout(r, 1800));
    setLoading(false);
    addBubble(`[v2 cargado · key ${keyIndex + 1}/${API_KEYS.length}]`, 'lady');
})();
</script>
</body>
</html>
